services:
  mysql:
    image: mysql:8.4
    container_name: java0715-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: java0715
      MYSQL_USER: bank
      MYSQL_PASSWORD: bank123456
    ports:
      - "3306:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    volumes:
      - mysql-data:/var/lib/mysql

volumes:
  mysql-data:
