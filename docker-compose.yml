services:
  mysql:
    image: mysql:8.4
    container_name: java0715-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: java0715
      MYSQL_USER: bank
      MYSQL_PASSWORD: bank123456
    ports:
      - "3306:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    volumes:
      - mysql-data:/var/lib/mysql

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: java0715-backend
    depends_on:
      - mysql
    environment:
      SPRING_PROFILES_ACTIVE: mysql
      DB_URL: jdbc:mysql://mysql:3306/java0715?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=utf8
      DB_USERNAME: bank
      DB_PASSWORD: bank123456
      BANK_API_KEY: dev-api-key
    ports:
      - "8081:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: java0715-frontend
    depends_on:
      - backend
    environment:
      VITE_API_PROXY_TARGET: http://backend:8080
    ports:
      - "5173:5173"

volumes:
  mysql-data:
