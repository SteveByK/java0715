spring:
  application:
    name: java0715
  datasource:
    url: ${DB_URL:jdbc:h2:mem:java0715;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  threads:
    virtual:
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html

bank:
  security:
    jwt-secret: ${BANK_JWT_SECRET:java0715-dev-jwt-secret-change-before-production-32bytes}
    access-token-ttl: ${BANK_ACCESS_TOKEN_TTL:15m}
    refresh-token-ttl: ${BANK_REFRESH_TOKEN_TTL:7d}
    max-failed-login: ${BANK_MAX_FAILED_LOGIN:5}
    lock-duration: ${BANK_LOCK_DURATION:15m}
  transfer:
    domestic-daily-limit: 500000.00
    high-risk-threshold: 200000.00
    remittance-high-risk-threshold: 50000.00
    default-remittance-fee-rate: 0.003
  lock:
    wait-timeout: 3s
    slow-wait-threshold: 200ms
    slow-hold-threshold: 500ms
