spring:
  application:
    name: java0715
  datasource:
    url: ${DB_URL:jdbc:h2:mem:java0715;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  threads:
    virtual:
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html

bank:
  security:
    api-key: ${BANK_API_KEY:dev-api-key}
  transfer:
    domestic-daily-limit: 500000.00
    high-risk-threshold: 200000.00
    remittance-high-risk-threshold: 50000.00
    default-remittance-fee-rate: 0.003
